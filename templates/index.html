<!DOCTYPE html>
<html>

<head>

<title>Igbo Grammar Checker</title>

<style>

body{
font-family: Arial;
background:#f5f7fb;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:600px;
margin:auto;
box-shadow:0px 0px 15px rgba(0,0,0,0.1);
}

h1{
color:#2c3e50;
}

textarea{
width:100%;
padding:15px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

button{
margin-top:15px;
padding:10px 20px;
font-size:16px;
background:#3498db;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

.correct{
margin-top:20px;
padding:15px;
background:#d4edda;
color:#155724;
border-radius:6px;
}

.error-box{
margin-top:20px;
padding:15px;
background:#f8d7da;
color:#721c24;
border-radius:6px;
text-align:left;
}

ul{
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>Igbo Grammar Checker</h1>

<form method="post">

<textarea name="text" rows="4" placeholder="Type an Igbo sentence..."></textarea>

<br>

<button type="submit">Check Sentence</button>

</form>


{% if correct %}

<div class="correct">

Sentence "<b>{{sentence}}</b>" is correct ✔

</div>

{% endif %}

{% if invalid %}

<div class="error-box">

Invalid entry  
Please enter a sentence.

</div>

{% endif %}

{% if errors %}

<div class="error-box">

<b>Errors for: {{sentence}}</b>

<ul>

{% for e in errors %}

<li>{{e}}</li>

{% endfor %}

</ul>

</div>

{% endif %}

</div>

</body>

</html>
